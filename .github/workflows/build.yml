name: Build OmniIDE Executables

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ─────────────────────────────────────────
  # WINDOWS
  # ─────────────────────────────────────────
  build-windows:
    name: 🪟 Windows Build
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Generate icon
        shell: python
        run: |
          import os
          from PIL import Image, ImageDraw

          os.makedirs("assets", exist_ok=True)
          sizes = [16, 32, 48, 64, 128, 256]
          images = []

          for size in sizes:
              img = Image.new("RGBA", (size, size), (0, 0, 0, 0))
              draw = ImageDraw.Draw(img)
              m = size // 8
              draw.ellipse([m, m, size-m, size-m], fill=(30, 30, 46, 255))
              i = size // 4
              draw.ellipse([i, i, size-i, size-i], fill=(137, 180, 250, 255))
              c = size // 2
              d = size // 6
              draw.ellipse([c-d, c-d, c+d, c+d], fill=(30, 30, 46, 255))
              images.append(img)

          images[0].save(
              "assets/icon.ico", format="ICO",
              sizes=[(s, s) for s in sizes],
              append_images=images[1:],
          )
          images[-1].save("assets/icon.png", format="PNG")
          print("Icons generated")

      - name: Patch spec icon for Windows
        shell: python
        run: |
          with open("OmniIDE.spec", "r") as f:
              content = f.read()

          # inject icon into EXE() call
          content = content.replace(
              "entitlements_file=None,",
              "entitlements_file=None,\n    icon='assets/icon.ico',",
          )

          with open("OmniIDE.spec", "w") as f:
              f.write(content)

          print("Spec patched with Windows icon")

      - name: Build with spec file
        run: pyinstaller OmniIDE.spec

      - name: Verify
        run: |
          if (Test-Path "dist/OmniIDE.exe") {
            Write-Host "✅ OmniIDE.exe built"
            Get-Item "dist/OmniIDE.exe" | Select-Object Name, Length
          } else {
            Write-Host "❌ Build failed"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniIDE-Windows
          path: dist/OmniIDE.exe
          retention-days: 30

  # ─────────────────────────────────────────
  # MACOS
  # ─────────────────────────────────────────
  build-macos:
    name: 🍎 macOS Build
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          brew install python-tk@3.11 || true
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Generate icon
        shell: python3 {0}
        run: |
          import os
          from PIL import Image, ImageDraw

          os.makedirs("assets", exist_ok=True)
          sizes = [16, 32, 48, 64, 128, 256]
          images = []

          for size in sizes:
              img = Image.new("RGBA", (size, size), (0, 0, 0, 0))
              draw = ImageDraw.Draw(img)
              m = size // 8
              draw.ellipse([m, m, size-m, size-m], fill=(30, 30, 46, 255))
              i = size // 4
              draw.ellipse([i, i, size-i, size-i], fill=(137, 180, 250, 255))
              c = size // 2
              d = size // 6
              draw.ellipse([c-d, c-d, c+d, c+d], fill=(30, 30, 46, 255))
              images.append(img)

          images[0].save(
              "assets/icon.ico", format="ICO",
              sizes=[(s, s) for s in sizes],
              append_images=images[1:],
          )
          images[-1].save("assets/icon.png", format="PNG")
          print("Icons generated")

      - name: Build with spec file
        run: pyinstaller OmniIDE.spec

      - name: Package
        run: |
          cd dist
          if [ -d "OmniIDE.app" ]; then
            zip -r OmniIDE-macOS.zip OmniIDE.app
          else
            zip -r OmniIDE-macOS.zip OmniIDE
          fi

      - name: Verify
        run: |
          if [ -f "dist/OmniIDE-macOS.zip" ]; then
            echo "✅ macOS build done"
            ls -lh dist/OmniIDE-macOS.zip
          else
            echo "❌ Build failed"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniIDE-macOS
          path: dist/OmniIDE-macOS.zip
          retention-days: 30

  # ─────────────────────────────────────────
  # LINUX
  # ─────────────────────────────────────────
  build-linux:
    name: 🐧 Linux Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            python3-tk \
            python3-dev \
            tk-dev \
            libx11-dev \
            libxft-dev \
            libxext-dev \
            libffi-dev \
            binutils

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Generate icon
        shell: python3 {0}
        run: |
          import os
          from PIL import Image, ImageDraw

          os.makedirs("assets", exist_ok=True)
          sizes = [16, 32, 48, 64, 128, 256]
          images = []

          for size in sizes:
              img = Image.new("RGBA", (size, size), (0, 0, 0, 0))
              draw = ImageDraw.Draw(img)
              m = size // 8
              draw.ellipse([m, m, size-m, size-m], fill=(30, 30, 46, 255))
              i = size // 4
              draw.ellipse([i, i, size-i, size-i], fill=(137, 180, 250, 255))
              c = size // 2
              d = size // 6
              draw.ellipse([c-d, c-d, c+d, c+d], fill=(30, 30, 46, 255))
              images.append(img)

          images[0].save(
              "assets/icon.ico", format="ICO",
              sizes=[(s, s) for s in sizes],
              append_images=images[1:],
          )
          images[-1].save("assets/icon.png", format="PNG")
          print("Icons generated")

      - name: Build with spec file
        run: pyinstaller OmniIDE.spec

      - name: Package
        run: |
          chmod +x dist/OmniIDE
          cd dist
          tar -czvf OmniIDE-Linux.tar.gz OmniIDE

      - name: Verify
        run: |
          if [ -f "dist/OmniIDE-Linux.tar.gz" ]; then
            echo "✅ Linux build done"
            ls -lh dist/OmniIDE-Linux.tar.gz
          else
            echo "❌ Build failed"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniIDE-Linux
          path: dist/OmniIDE-Linux.tar.gz
          retention-days: 30

  # ─────────────────────────────────────────
  # RELEASE
  # ─────────────────────────────────────────
  release:
    name: 🚀 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release/

      - name: List release files
        run: find release/ -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "OmniIDE ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          body: |
            # 🚀 OmniIDE ${{ github.ref_name }}
            **by OmniNodeCo**

            Fast. Modern. Lightweight. No Electron. No bloat.

            ## 📦 Downloads

            | Platform | File |
            |----------|------|
            | 🪟 Windows | `OmniIDE.exe` |
            | 🍎 macOS   | `OmniIDE-macOS.zip` |
            | 🐧 Linux   | `OmniIDE-Linux.tar.gz` |

            ## 🛠 Install

            **Windows** — Run `OmniIDE.exe` directly.

            **macOS**
            ```bash
            unzip OmniIDE-macOS.zip && open OmniIDE.app
            ```

            **Linux**
            ```bash
            tar -xzvf OmniIDE-Linux.tar.gz && chmod +x OmniIDE && ./OmniIDE
            ```

            ---
            Made with ❤️ by **OmniNodeCo**
          draft: false
          prerelease: false
          files: |
            release/OmniIDE-Windows/OmniIDE.exe
            release/OmniIDE-macOS/OmniIDE-macOS.zip
            release/OmniIDE-Linux/OmniIDE-Linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
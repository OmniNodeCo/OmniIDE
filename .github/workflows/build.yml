name: Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:

  test:
    name: "Test"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pillow

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short || python -m unittest discover tests/ -v

      - name: Verify version
        run: |
          python -c "
          from src.config import APP_NAME, APP_VERSION
          print(f'{APP_NAME} v{APP_VERSION}')
          "

  build-windows:
    name: "Windows"
    runs-on: windows-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Generate icon
        shell: python
        run: |
          import os
          from PIL import Image, ImageDraw
          os.makedirs("assets", exist_ok=True)
          sizes = [16, 32, 48, 64, 128, 256]
          images = []
          for size in sizes:
              img = Image.new("RGBA", (size, size), (0, 0, 0, 0))
              draw = ImageDraw.Draw(img)
              m = size // 8
              draw.ellipse([m, m, size-m, size-m], fill=(30, 30, 46, 255))
              r_w = max(2, size // 16)
              r_m = size // 5
              draw.ellipse([r_m, r_m, size-r_m, size-r_m], outline=(137, 180, 250, 255), width=r_w)
              i = size // 4
              draw.ellipse([i, i, size-i, size-i], outline=(203, 166, 247, 200), width=max(1, size//20))
              c = size // 2
              d = max(2, size // 10)
              draw.ellipse([c-d, c-d, c+d, c+d], fill=(245, 194, 231, 255))
              images.append(img)
          images[0].save("assets/icon.ico", format="ICO", sizes=[(s,s) for s in sizes], append_images=images[1:])
          images[-1].save("assets/icon.png", format="PNG")

      - name: Patch spec
        shell: python
        run: |
          with open("OmniIDE.spec", "r") as f:
              c = f.read()
          if "icon=" not in c:
              c = c.replace("entitlements_file=None,", "entitlements_file=None,\n    icon='assets/icon.ico',")
              with open("OmniIDE.spec", "w") as f:
                  f.write(c)

      - name: Build
        run: pyinstaller OmniIDE.spec

      - name: Verify
        run: |
          if (Test-Path "dist/OmniIDE.exe") { Write-Host "OK" } else { exit 1 }

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: OmniIDE-Windows-dev
          path: dist/OmniIDE.exe
          retention-days: 7

  build-macos:
    name: "macOS"
    runs-on: macos-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          brew install python-tk@3.11 || true
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Generate icon
        shell: python3 {0}
        run: |
          import os
          from PIL import Image, ImageDraw
          os.makedirs("assets", exist_ok=True)
          sizes = [16, 32, 48, 64, 128, 256]
          images = []
          for size in sizes:
              img = Image.new("RGBA", (size, size), (0, 0, 0, 0))
              draw = ImageDraw.Draw(img)
              m = size // 8
              draw.ellipse([m, m, size-m, size-m], fill=(30, 30, 46, 255))
              r_w = max(2, size // 16)
              r_m = size // 5
              draw.ellipse([r_m, r_m, size-r_m, size-r_m], outline=(137, 180, 250, 255), width=r_w)
              i = size // 4
              draw.ellipse([i, i, size-i, size-i], outline=(203, 166, 247, 200), width=max(1, size//20))
              c = size // 2
              d = max(2, size // 10)
              draw.ellipse([c-d, c-d, c+d, c+d], fill=(245, 194, 231, 255))
              images.append(img)
          images[0].save("assets/icon.ico", format="ICO", sizes=[(s,s) for s in sizes], append_images=images[1:])
          images[-1].save("assets/icon.png", format="PNG")

      - name: Build
        run: pyinstaller OmniIDE.spec

      - name: Package
        run: |
          cd dist
          if [ -d "OmniIDE.app" ]; then zip -r OmniIDE-macOS.zip OmniIDE.app
          else chmod +x OmniIDE && zip -r OmniIDE-macOS.zip OmniIDE; fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: OmniIDE-macOS-dev
          path: dist/OmniIDE-macOS.zip
          retention-days: 7

  build-linux:
    name: "Linux"
    runs-on: ubuntu-22.04
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            python3-tk python3-dev tk-dev \
            libx11-dev libxft-dev libxext-dev \
            libffi-dev binutils

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Generate icon
        shell: python3 {0}
        run: |
          import os
          from PIL import Image, ImageDraw
          os.makedirs("assets", exist_ok=True)
          sizes = [16, 32, 48, 64, 128, 256]
          images = []
          for size in sizes:
              img = Image.new("RGBA", (size, size), (0, 0, 0, 0))
              draw = ImageDraw.Draw(img)
              m = size // 8
              draw.ellipse([m, m, size-m, size-m], fill=(30, 30, 46, 255))
              r_w = max(2, size // 16)
              r_m = size // 5
              draw.ellipse([r_m, r_m, size-r_m, size-r_m], outline=(137, 180, 250, 255), width=r_w)
              i = size // 4
              draw.ellipse([i, i, size-i, size-i], outline=(203, 166, 247, 200), width=max(1, size//20))
              c = size // 2
              d = max(2, size // 10)
              draw.ellipse([c-d, c-d, c+d, c+d], fill=(245, 194, 231, 255))
              images.append(img)
          images[0].save("assets/icon.ico", format="ICO", sizes=[(s,s) for s in sizes], append_images=images[1:])
          images[-1].save("assets/icon.png", format="PNG")

      - name: Build
        run: pyinstaller OmniIDE.spec

      - name: Package
        run: |
          chmod +x dist/OmniIDE
          cd dist && tar -czvf OmniIDE-Linux.tar.gz OmniIDE

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: OmniIDE-Linux-dev
          path: dist/OmniIDE-Linux.tar.gz
          retention-days: 7
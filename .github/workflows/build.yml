name: Build OmniIDE Executables

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ─────────────────────────────────────────
  # WINDOWS BUILD
  # ─────────────────────────────────────────
  build-windows:
    name: 🪟 Windows Build
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows executable
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name OmniIDE `
            --icon assets/logo.ico `
            --add-data "assets;assets" `
            --hidden-import ttkbootstrap `
            --hidden-import tkinter `
            run.py

      - name: Verify build output
        run: |
          if (Test-Path "dist/OmniIDE.exe") {
            Write-Host "✅ OmniIDE.exe built successfully"
            Get-Item "dist/OmniIDE.exe" | Select-Object Name, Length, LastWriteTime
          } else {
            Write-Host "❌ Build failed — OmniIDE.exe not found"
            exit 1
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniIDE-Windows
          path: dist/OmniIDE.exe
          retention-days: 30

  # ─────────────────────────────────────────
  # MACOS BUILD
  # ─────────────────────────────────────────
  build-macos:
    name: 🍎 macOS Build
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          brew install python-tk@3.11 || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS app bundle
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name OmniIDE \
            --add-data "assets:assets" \
            --hidden-import ttkbootstrap \
            --hidden-import tkinter \
            --osx-bundle-identifier com.omninodeco.omniide \
            run.py

      - name: Package into zip
        run: |
          cd dist
          zip -r OmniIDE-macOS.zip OmniIDE.app || zip -r OmniIDE-macOS.zip OmniIDE
          cd ..

      - name: Verify build output
        run: |
          if [ -f "dist/OmniIDE-macOS.zip" ]; then
            echo "✅ OmniIDE macOS built successfully"
            ls -lh dist/OmniIDE-macOS.zip
          else
            echo "❌ Build failed"
            exit 1
          fi

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniIDE-macOS
          path: dist/OmniIDE-macOS.zip
          retention-days: 30

  # ─────────────────────────────────────────
  # LINUX BUILD
  # ─────────────────────────────────────────
  build-linux:
    name: 🐧 Linux Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            python3-tk \
            python3-dev \
            tk-dev \
            libx11-dev \
            libxft-dev \
            libxext-dev \
            libffi-dev \
            binutils

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Linux executable
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name OmniIDE \
            --add-data "assets:assets" \
            --hidden-import ttkbootstrap \
            --hidden-import tkinter \
            run.py

      - name: Make executable
        run: chmod +x dist/OmniIDE

      - name: Package into tar.gz
        run: |
          cd dist
          tar -czvf OmniIDE-Linux.tar.gz OmniIDE
          cd ..

      - name: Verify build output
        run: |
          if [ -f "dist/OmniIDE-Linux.tar.gz" ]; then
            echo "✅ OmniIDE Linux built successfully"
            ls -lh dist/OmniIDE-Linux.tar.gz
          else
            echo "❌ Build failed"
            exit 1
          fi

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniIDE-Linux
          path: dist/OmniIDE-Linux.tar.gz
          retention-days: 30

  # ─────────────────────────────────────────
  # RELEASE — runs only on version tags
  # ─────────────────────────────────────────
  release:
    name: 🚀 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: OmniIDE-Windows
          path: release/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: OmniIDE-macOS
          path: release/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: OmniIDE-Linux
          path: release/

      - name: List release files
        run: ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "OmniIDE ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          body: |
            # 🚀 OmniIDE ${{ github.ref_name }}
            **by OmniNodeCo**

            A fast, modern, lightweight desktop IDE.
            No Electron. No bloat. Pure speed.

            ---

            ## 📦 Downloads

            | Platform | File |
            |----------|------|
            | 🪟 Windows | `OmniIDE.exe` |
            | 🍎 macOS   | `OmniIDE-macOS.zip` |
            | 🐧 Linux   | `OmniIDE-Linux.tar.gz` |

            ---

            ## 🛠 Installation

            **Windows**
            ```
            Download OmniIDE.exe and run it directly. No install needed.
            ```

            **macOS**
            ```bash
            unzip OmniIDE-macOS.zip
            open OmniIDE.app
            # If blocked: System Preferences → Security → Open Anyway
            ```

            **Linux**
            ```bash
            tar -xzvf OmniIDE-Linux.tar.gz
            chmod +x OmniIDE
            ./OmniIDE
            ```

            ---

            ## ✨ What's New
            See [CHANGELOG](https://github.com/OmniNodeCo/OmniIDE/blob/main/README.md)

            ---
            Made with ❤️ by **OmniNodeCo**
          draft: false
          prerelease: false
          files: |
            release/OmniIDE.exe
            release/OmniIDE-macOS.zip
            release/OmniIDE-Linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
name: Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  QT_QPA_PLATFORM: offscreen
  APP_VERSION_CHECK: "1.0.7"
  QT_DEPS: >-
    libgl1 libglu1-mesa libegl1 libxkbcommon0
    libdbus-1-3 libxcb-cursor0 libxcb-xinerama0
    libxcb-randr0 libxcb-shape0 libxcb-xfixes0
    libxcb-icccm4 libxcb-image0 libxcb-keysyms1
    libxcb-render-util0 libfontconfig1 libfreetype6

jobs:

  structure:
    name: "File Structure"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check files
        run: |
          MISSING=0
          FILES=(
            "run.py" "OmniIDE.spec" "requirements.txt" "setup.py" "LICENSE" "README.md"
            "assets/themes/dark.json" "assets/themes/light.json"
            "src/__init__.py" "src/app.py" "src/config.py"
            "src/core/__init__.py" "src/core/file_manager.py" "src/core/git_manager.py"
            "src/core/git_installer.py" "src/core/extension_manager.py" "src/core/updater.py"
            "src/core/syntax_highlighter.py" "src/core/tab_manager.py" "src/core/terminal.py"
            "src/core/search.py" "src/core/command_palette.py"
            "src/ui/__init__.py" "src/ui/editor_widget.py" "src/ui/sidebar.py"
            "src/ui/terminal_widget.py" "src/ui/toolbar.py" "src/ui/statusbar.py"
            "src/ui/menubar.py" "src/ui/command_palette.py" "src/ui/settings_dialog.py"
            "src/ui/splash.py" "src/ui/theme_stylesheet.py" "src/ui/icons.py"
            "src/ui/file_tree.py" "src/ui/welcome.py"
            "src/ui/extensions_panel.py" "src/ui/settings_panel.py"
            "src/utils/__init__.py" "src/utils/theme_loader.py" "src/utils/recent_files.py"
            "src/utils/shortcuts.py" "src/utils/styles.py" "src/utils/icon_manager.py"
            "docs/index.html" "docs/style.css" "docs/script.js" "docs/favicon.svg"
          )
          for f in "${FILES[@]}"; do
            if [ ! -f "$f" ]; then echo "  MISSING: $f"; MISSING=$((MISSING+1)); else echo "  OK: $f"; fi
          done
          if [ $MISSING -gt 0 ]; then echo "ERROR: $MISSING file(s) missing!"; exit 1; fi
          echo "All ${#FILES[@]} files present"

  imports:
    name: "Import Check"
    runs-on: ubuntu-latest
    needs: structure
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ${{ env.QT_DEPS }}
          pip install --upgrade pip
          pip install -r requirements.txt pillow
      - name: Config
        run: |
          python -c "
          from src.config import APP_NAME, APP_VERSION, APP_AUTHOR
          assert APP_VERSION == '${{ env.APP_VERSION_CHECK }}', f'Version mismatch: {APP_VERSION}'
          print(f'{APP_NAME} v{APP_VERSION} — OK')
          "
      - name: Init
        run: |
          python -c "
          from src import __version__
          assert __version__ == '${{ env.APP_VERSION_CHECK }}'
          print(f'v{__version__} — OK')
          "
      - name: Utils
        run: python -c "from src.utils.theme_loader import ThemeLoader; from src.utils.recent_files import RecentFilesManager; print('OK')"
      - name: Core
        run: python -c "from src.core.extension_manager import ExtensionManager; from src.core.updater import Updater; from src.core.git_installer import GitInstaller; print('OK')"
      - name: PyQt6
        run: python -c "from PyQt6.QtWidgets import QApplication; from PyQt6.QtSvg import QSvgRenderer; app=QApplication([]); print('OK'); app.quit()"
      - name: Icons
        run: |
          python -c "
          from src.ui.icons import SVGS, svg_icon
          assert len(SVGS) > 15
          for i in ['files','git','extensions','new_file','save','search','settings','theme','terminal','palette','clone','commit','push','pull','diff','branch','log','status','stage','remote','install','uninstall','refresh']:
              assert i in SVGS, f'Missing: {i}'
          print(f'{len(SVGS)} icons — OK')
          "
      - name: Themes
        run: |
          python -c "
          import json
          for t in ['dark','light']:
              with open(f'assets/themes/{t}.json') as f: d=json.load(f)
              for c in ['bg_primary','bg_secondary','fg_primary','accent','editor_bg','editor_fg','sidebar_bg','terminal_bg','terminal_fg']:
                  assert c in d['colors']
              for s in ['keyword','string','comment','number','function']:
                  assert s in d['syntax']
              print(f'{t}.json — OK')
          "

  logic:
    name: "Logic Tests"
    runs-on: ubuntu-latest
    needs: imports
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ${{ env.QT_DEPS }}
          pip install --upgrade pip
          pip install -r requirements.txt pillow
      - name: ThemeLoader
        run: python -c "from src.utils.theme_loader import ThemeLoader; d=ThemeLoader('dark'); l=ThemeLoader('light'); assert d.colors['bg_primary']!=l.colors['bg_primary']; print('OK')"
      - name: RecentFiles
        run: |
          python -c "
          import tempfile,os; from src.utils.recent_files import RecentFilesManager
          m=RecentFilesManager()
          with tempfile.NamedTemporaryFile(delete=False,suffix='.py') as f: f.write(b'#'); p=f.name
          try: m.add(p); assert os.path.abspath(p) in m.get_all(); m.clear(); assert len(m.get_all())==0
          finally: os.unlink(p)
          print('OK')
          "
      - name: ExtensionManager
        run: python -c "from src.core.extension_manager import ExtensionManager as E; assert E.format_installs(500)=='500'; assert E.format_installs(1500)=='1.5K'; assert E.format_installs(2500000)=='2.5M'; print('OK')"
      - name: Updater
        run: python -c "from src.core.updater import Updater; u=Updater.__new__(Updater); assert u._is_newer('1.0.8','1.0.7'); assert not u._is_newer('1.0.7','1.0.7'); assert not u._is_newer('1.0.6','1.0.7'); print('OK')"
      - name: GitInstaller
        run: python -c "from src.core.git_installer import GitInstaller; g=GitInstaller.__new__(GitInstaller); assert g._get_platform_key() in ('win32','darwin','linux'); print('OK')"
      - name: Defaults
        run: |
          python -c "
          from src.config import DEFAULT_SETTINGS
          for k in ['theme','font_family','font_size','tab_size','show_line_numbers','word_wrap','auto_indent','auto_save','auto_check_updates','suppress_git_prompt']:
              assert k in DEFAULT_SETTINGS
          print(f'{len(DEFAULT_SETTINGS)} keys — OK')
          "
      - name: Stylesheet
        run: python -c "from src.utils.theme_loader import ThemeLoader; from src.ui.theme_stylesheet import build_stylesheet; css=build_stylesheet(ThemeLoader('dark').colors); assert 'QMainWindow' in css and 'QPushButton' in css and 'QPlainTextEdit' in css; print(f'{len(css)} chars — OK')"

  gui:
    name: "GUI Tests"
    runs-on: ubuntu-latest
    needs: imports
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ${{ env.QT_DEPS }}
          pip install --upgrade pip
          pip install -r requirements.txt pillow
      - name: Widgets
        run: |
          python -c "
          import sys,os; os.environ['QT_QPA_PLATFORM']='offscreen'
          from PyQt6.QtWidgets import QApplication; app=QApplication(sys.argv)
          from src.utils.theme_loader import ThemeLoader; from src.ui.theme_stylesheet import build_stylesheet
          L=ThemeLoader('dark'); c=L.colors; s=L.syntax; app.setStyleSheet(build_stylesheet(c))
          class M:
              def __init__(self):
                  self.settings={'theme':'dark','font_family':'Monospace','font_size':13,'tab_size':4,'show_line_numbers':True,'word_wrap':False,'auto_indent':True,'highlight_current_line':True,'sidebar_width':280}
                  self.colors=c; self.syntax_colors=s; self.current_project_path=None
              def set_status(self,t): pass
              def save_settings(self): pass
          m=M()
          from src.ui.editor_widget import CodeEditor
          e=CodeEditor(m,filepath='test.py'); e.set_content('print(1)'); assert e.get_content()=='print(1)'; print('Editor OK')
          from src.ui.splash import SplashScreen
          sp=SplashScreen(); sp.set_status('T'); sp.set_progress(100); sp.close(); print('Splash OK')
          from src.ui.statusbar import StatusBar
          sb=StatusBar(m); sb.set_text('t'); sb.update_file_type('Python'); print('StatusBar OK')
          from src.ui.icons import SVGS,svg_icon
          for n in SVGS:
              i=svg_icon(n,16); assert not i.isNull()
          print(f'{len(SVGS)} icons OK')
          css=build_stylesheet(c)
          for sel in ['QMainWindow','QPushButton','QPlainTextEdit','QTabBar','QTreeView','QScrollBar','QMenu','QLineEdit','QComboBox','QLabel','QMenuBar','QDialog','QProgressBar','QCheckBox','QSlider','QToolTip']:
              assert sel in css
          print('Selectors OK')
          app.quit()
          "
      - name: Integration
        run: |
          python -c "
          import sys,os; os.environ['QT_QPA_PLATFORM']='offscreen'
          from PyQt6.QtWidgets import QApplication; app=QApplication(sys.argv)
          from src.utils.theme_loader import ThemeLoader; from src.ui.editor_widget import EditorTabWidget,SearchWidget
          L=ThemeLoader('dark')
          class M:
              def __init__(self):
                  self.settings={'theme':'dark','font_family':'Monospace','font_size':13,'tab_size':4,'show_line_numbers':True,'word_wrap':False,'auto_indent':True,'highlight_current_line':True,'sidebar_width':280}
                  self.colors=L.colors; self.syntax_colors=L.syntax; self.current_project_path=None
              def set_status(self,t): pass
              def save_settings(self): pass
          m=M()
          from src.ui.statusbar import StatusBar; m.statusbar=StatusBar(m)
          tabs=EditorTabWidget(m); tabs.new_tab(content='hi',title='T'); assert tabs.tabs.count()==1
          tabs.new_tab(filepath='t.py',content='x=1'); assert tabs.tabs.count()==2
          sw=SearchWidget(tabs); sw.toggle(); assert sw.isVisible(); sw.toggle(); assert not sw.isVisible()
          for i in range(5): tabs.new_tab(content=f'c{i}',title=f'T{i}')
          assert tabs.tabs.count()==7; tabs.apply_font(); tabs.refresh_all()
          print('Integration OK')
          app.quit()
          "

  spec:
    name: "Spec Validation"
    runs-on: ubuntu-latest
    needs: structure
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ${{ env.QT_DEPS }}
          pip install --upgrade pip
          pip install -r requirements.txt pillow pyinstaller
      - name: Validate
        run: |
          python -c "
          import ast
          with open('OmniIDE.spec') as f: content=f.read()
          ast.parse(content); print('Syntax OK')
          for m in ['src.app','src.config','src.core.file_manager','src.core.git_manager','src.core.git_installer','src.core.extension_manager','src.core.updater','src.core.syntax_highlighter','src.core.tab_manager','src.core.terminal','src.core.search','src.core.command_palette','src.ui.editor_widget','src.ui.sidebar','src.ui.terminal_widget','src.ui.toolbar','src.ui.statusbar','src.ui.menubar','src.ui.command_palette','src.ui.settings_dialog','src.ui.splash','src.ui.theme_stylesheet','src.ui.icons','src.ui.file_tree','src.ui.welcome','src.ui.extensions_panel','src.ui.settings_panel','src.utils.theme_loader','src.utils.recent_files','src.utils.shortcuts','src.utils.styles','src.utils.icon_manager']:
              assert m in content, f'MISSING: {m}'
          print('All modules OK')
          "

  docs:
    name: "Docs"
    runs-on: ubuntu-latest
    needs: structure
    steps:
      - uses: actions/checkout@v4
      - name: Check
        run: |
          for f in docs/index.html docs/style.css docs/script.js docs/favicon.svg; do
            [ -f "$f" ] && echo "OK: $f" || echo "MISSING: $f"
          done
          grep -q "1.0.7" docs/index.html && echo "v1.0.7 OK" || echo "WARN: version"
          grep -q "PyQt6" docs/index.html && echo "PyQt6 OK"

  summary:
    name: "Summary"
    runs-on: ubuntu-latest
    needs: [structure, imports, logic, gui, spec, docs]
    if: always()
    steps:
      - name: Results
        run: |
          echo "## Tests v${{ env.APP_VERSION_CHECK }}" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Structure | ${{ needs.structure.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Imports | ${{ needs.imports.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Logic | ${{ needs.logic.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GUI | ${{ needs.gui.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Spec | ${{ needs.spec.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docs | ${{ needs.docs.result }} |" >> $GITHUB_STEP_SUMMARY
      - name: Fail
        if: contains(needs.*.result, 'failure')
        run: exit 1
      - name: Pass
        if: "!contains(needs.*.result, 'failure')"
        run: echo "All tests passed for v${{ env.APP_VERSION_CHECK }}!"
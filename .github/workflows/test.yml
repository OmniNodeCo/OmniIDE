name: Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:

  structure:
    name: "File Structure"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check all required files exist
        run: |
          MISSING=0
          FILES=(
            "run.py"
            "OmniIDE.spec"
            "requirements.txt"
            "setup.py"
            "LICENSE"
            "README.md"
            "assets/icons/__init__.py"
            "assets/icons/icons.py"
            "assets/themes/dark.json"
            "assets/themes/light.json"
            "src/__init__.py"
            "src/app.py"
            "src/config.py"
            "src/core/__init__.py"
            "src/core/editor.py"
            "src/core/tab_manager.py"
            "src/core/syntax_highlighter.py"
            "src/core/file_manager.py"
            "src/core/terminal.py"
            "src/core/search.py"
            "src/core/git_manager.py"
            "src/core/git_installer.py"
            "src/core/extension_manager.py"
            "src/core/command_palette.py"
            "src/core/updater.py"
            "src/ui/__init__.py"
            "src/ui/menubar.py"
            "src/ui/sidebar.py"
            "src/ui/statusbar.py"
            "src/ui/toolbar.py"
            "src/ui/file_tree.py"
            "src/ui/welcome.py"
            "src/ui/splash.py"
            "src/ui/extensions_panel.py"
            "src/ui/settings_panel.py"
            "src/utils/__init__.py"
            "src/utils/icon_manager.py"
            "src/utils/theme_loader.py"
            "src/utils/recent_files.py"
            "src/utils/shortcuts.py"
            "src/utils/styles.py"
            "tests/__init__.py"
            "tests/test_config.py"
            "tests/test_theme_loader.py"
            "tests/test_icons.py"
            "tests/test_updater.py"
            "tests/test_syntax.py"
            "tests/test_extensions.py"
            "tests/test_recent_files.py"
            "tests/test_git_installer.py"
            "tests/test_gui.py"
          )

          for f in "${FILES[@]}"; do
            if [ ! -f "$f" ]; then
              echo "  MISSING: $f"
              MISSING=$((MISSING + 1))
            else
              echo "  OK: $f"
            fi
          done

          echo ""
          if [ $MISSING -gt 0 ]; then
            echo "ERROR: $MISSING file(s) missing!"
            exit 1
          fi
          echo "All ${#FILES[@]} required files present"

  imports:
    name: "Import Check"
    runs-on: ubuntu-latest
    needs: structure

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y python3-tk python3-dev tk-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pillow

      - name: Test config imports
        run: |
          python -c "
          from src.config import APP_NAME, APP_VERSION, APP_AUTHOR
          from src.config import DEFAULT_SETTINGS, SETTINGS_PATH, CONFIG_DIR
          from src.config import SUPPORTED_EXTENSIONS, FILE_DIALOG_TYPES
          from src.config import FONT_OPTIONS, GIT_DOWNLOAD_URLS
          from src.config import VSCODE_MARKETPLACE_URL, VSCODE_MARKETPLACE_VERSION
          from src.config import APP_GITHUB_API, APP_RELEASES_URL, APP_WEBSITE
          from src.config import ASSETS_DIR, THEMES_DIR, EXTENSIONS_DIR
          print(f'{APP_NAME} v{APP_VERSION} by {APP_AUTHOR}')
          assert APP_VERSION == '1.0.4', f'Version mismatch: {APP_VERSION}'
          print('config.py — OK')
          "

      - name: Test __init__ imports
        run: |
          python -c "
          from src import __version__, __author__
          assert __version__ == '1.0.4', f'Version mismatch: {__version__}'
          print(f'src/__init__.py — v{__version__} by {__author__} — OK')
          "

      - name: Test utils imports
        run: |
          python -c "
          from src.utils.theme_loader import ThemeLoader
          from src.utils.recent_files import RecentFilesManager
          from src.utils.icon_manager import IconManager, EXTENSION_ICON_MAP, FOLDER_ICON_MAP
          from src.utils.icon_manager import get_file_icon_name, get_folder_icon_name
          from src.utils.styles import apply_global_styles, make_round_btn, make_icon_btn, make_action_row
          from src.utils.shortcuts import ShortcutManager
          print('All utils imports — OK')
          "

      - name: Test core imports
        run: |
          python -c "
          from src.core.syntax_highlighter import SyntaxHighlighter
          from src.core.extension_manager import ExtensionManager
          from src.core.updater import Updater
          from src.core.git_installer import GitInstaller
          print('All core imports — OK')
          "

      - name: Test assets imports
        run: |
          python -c "
          from assets.icons.icons import ICONS
          icon_count = len(ICONS)
          assert icon_count > 30, f'Only {icon_count} icons found'
          required = ['file', 'folder_closed', 'folder_open', 'new_file', 'save',
                      'search', 'terminal', 'close', 'settings', 'theme',
                      'arrow_left', 'arrow_right', 'run', 'info', 'warning',
                      'error', 'success', 'explorer', 'folder_git']
          missing = [i for i in required if i not in ICONS]
          assert not missing, f'Missing icons: {missing}'
          print(f'assets.icons — {icon_count} icons — OK')
          "

      - name: Test theme files
        run: |
          python -c "
          import json, os

          for theme in ['dark', 'light']:
              path = f'assets/themes/{theme}.json'
              assert os.path.exists(path), f'{path} not found'
              with open(path) as f:
                  data = json.load(f)
              assert 'colors' in data, f'{theme}.json missing colors'
              assert 'syntax' in data, f'{theme}.json missing syntax'
              required_colors = ['bg_primary', 'bg_secondary', 'fg_primary',
                                 'accent', 'editor_bg', 'editor_fg',
                                 'sidebar_bg', 'terminal_bg', 'terminal_fg']
              missing = [c for c in required_colors if c not in data['colors']]
              assert not missing, f'{theme}.json missing colors: {missing}'
              required_syntax = ['keyword', 'string', 'comment', 'number', 'function']
              missing = [s for s in required_syntax if s not in data['syntax']]
              assert not missing, f'{theme}.json missing syntax: {missing}'
              print(f'themes/{theme}.json — OK')
          "

  logic:
    name: "Logic Tests"
    runs-on: ubuntu-latest
    needs: imports

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y python3-tk python3-dev tk-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pillow

      - name: Test ThemeLoader
        run: |
          python -c "
          from src.utils.theme_loader import ThemeLoader

          dark = ThemeLoader('dark')
          assert dark.colors['bg_primary']
          assert dark.syntax['keyword']
          print(f'ThemeLoader dark — {len(dark.colors)} colors — OK')

          light = ThemeLoader('light')
          assert light.colors['bg_primary']
          assert light.colors['bg_primary'] != dark.colors['bg_primary']
          print(f'ThemeLoader light — {len(light.colors)} colors — OK')

          fallback = ThemeLoader('nonexistent')
          assert fallback.colors['bg_primary']
          print('ThemeLoader fallback — OK')
          "

      - name: Test RecentFilesManager
        run: |
          python -c "
          import tempfile, os
          from src.utils.recent_files import RecentFilesManager

          mgr = RecentFilesManager()
          with tempfile.NamedTemporaryFile(delete=False, suffix='.py') as f:
              f.write(b'# test')
              path = f.name
          try:
              mgr.add(path)
              files = mgr.get_all()
              assert os.path.abspath(path) in files
              print(f'RecentFiles add — OK')
              mgr.clear()
              assert len(mgr.get_all()) == 0
              print('RecentFiles clear — OK')
          finally:
              os.unlink(path)
          "

      - name: Test SyntaxHighlighter
        run: |
          python -c "
          from src.core.syntax_highlighter import SyntaxHighlighter

          h = SyntaxHighlighter.__new__(SyntaxHighlighter)
          tests = {
              'test.py': 'python', 'test.js': 'javascript',
              'test.ts': 'javascript', 'test.html': 'html',
              'test.css': 'css', 'test.json': 'json',
              'test.txt': 'text', None: 'python',
          }
          for fp, expected in tests.items():
              h.filepath = fp
              result = h._detect_language()
              assert result == expected, f'{fp}: expected {expected}, got {result}'
          print('SyntaxHighlighter detection — OK')
          "

      - name: Test IconManager
        run: |
          python -c "
          from src.utils.icon_manager import get_file_icon_name, get_folder_icon_name, IconManager

          assert get_file_icon_name('main.py') == 'file_python'
          assert get_file_icon_name('app.js') == 'file_javascript'
          assert get_file_icon_name('unknown.xyz') == 'file'
          assert get_folder_icon_name('src') == 'folder_src'
          assert get_folder_icon_name('.git') == 'folder_git'
          assert get_folder_icon_name('random') == 'folder_closed'
          assert get_folder_icon_name('random', True) == 'folder_open'

          mgr = IconManager()
          assert mgr.get_text('file_python') == '[Py]'
          assert mgr.get_text('folder_closed') == '[+]'
          print('IconManager — OK')
          "

      - name: Test ExtensionManager helpers
        run: |
          python -c "
          from src.core.extension_manager import ExtensionManager

          assert ExtensionManager.format_installs(500) == '500'
          assert ExtensionManager.format_installs(1500) == '1.5K'
          assert ExtensionManager.format_installs(2500000) == '2.5M'
          print('ExtensionManager.format_installs — OK')
          "

      - name: Test Updater version comparison
        run: |
          python -c "
          from src.core.updater import Updater

          u = Updater.__new__(Updater)
          assert u._is_newer('1.0.5', '1.0.4') == True
          assert u._is_newer('1.0.4', '1.0.4') == False
          assert u._is_newer('1.0.3', '1.0.4') == False
          assert u._is_newer('2.0.0', '1.9.9') == True
          assert u._is_newer('1.0.0.2', '1.0.0.1') == True
          print('Updater._is_newer — OK')
          "

      - name: Test GitInstaller detection
        run: |
          python -c "
          from src.core.git_installer import GitInstaller

          gi = GitInstaller.__new__(GitInstaller)
          key = gi._get_platform_key()
          name = gi._get_platform_name()
          assert key in ('win32', 'darwin', 'linux')
          assert name in ('Windows', 'macOS', 'Linux')
          print(f'GitInstaller platform: {name} ({key}) — OK')
          "

      - name: Test config defaults
        run: |
          python -c "
          from src.config import DEFAULT_SETTINGS

          required = [
              'theme', 'font_family', 'font_size', 'tab_size',
              'show_line_numbers', 'word_wrap', 'auto_indent',
              'auto_save', 'auto_check_updates', 'window_width',
              'window_height', 'sidebar_width', 'terminal_height',
              'max_recent_files', 'default_shell', 'installed_extensions',
              'highlight_current_line', 'show_whitespace', 'cursor_blink',
              'minimap_enabled', 'suppress_git_prompt',
          ]
          missing = [k for k in required if k not in DEFAULT_SETTINGS]
          assert not missing, f'Missing: {missing}'
          assert isinstance(DEFAULT_SETTINGS['theme'], str)
          assert isinstance(DEFAULT_SETTINGS['font_size'], int)
          assert isinstance(DEFAULT_SETTINGS['auto_indent'], bool)
          assert isinstance(DEFAULT_SETTINGS['installed_extensions'], list)
          print(f'DEFAULT_SETTINGS — {len(DEFAULT_SETTINGS)} keys — OK')
          "

  unit:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    needs: imports

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y python3-tk python3-dev tk-dev xvfb

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pillow pytest

      - name: Run unit tests
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" \
            python -m pytest tests/test_config.py tests/test_theme_loader.py tests/test_icons.py \
            tests/test_updater.py tests/test_syntax.py tests/test_extensions.py \
            tests/test_recent_files.py tests/test_git_installer.py \
            -v --tb=short

  gui:
    name: "GUI Tests"
    runs-on: ubuntu-latest
    needs: imports

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            python3-tk python3-dev tk-dev \
            xvfb x11-utils

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pillow pytest

      - name: Run GUI tests with Xvfb
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" \
            python -m pytest tests/test_gui.py -v --tb=short

  spec:
    name: "Spec Validation"
    runs-on: ubuntu-latest
    needs: structure

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pillow pyinstaller

      - name: Validate spec file
        run: |
          python -c "
          import ast

          with open('OmniIDE.spec', 'r') as f:
              content = f.read()

          try:
              ast.parse(content)
              print('OmniIDE.spec — valid Python syntax — OK')
          except SyntaxError as e:
              print(f'OmniIDE.spec — SYNTAX ERROR: {e}')
              exit(1)

          required = [
              'src.app', 'src.config',
              'src.core.editor', 'src.core.tab_manager',
              'src.core.syntax_highlighter', 'src.core.file_manager',
              'src.core.terminal', 'src.core.search',
              'src.core.git_manager', 'src.core.git_installer',
              'src.core.extension_manager', 'src.core.command_palette',
              'src.core.updater',
              'src.ui.menubar', 'src.ui.sidebar',
              'src.ui.statusbar', 'src.ui.toolbar',
              'src.ui.file_tree', 'src.ui.welcome',
              'src.ui.splash', 'src.ui.extensions_panel',
              'src.ui.settings_panel',
              'src.utils.theme_loader', 'src.utils.recent_files',
              'src.utils.shortcuts', 'src.utils.styles',
              'src.utils.icon_manager',
          ]
          missing = [m for m in required if m not in content]
          if missing:
              print(f'WARNING: Missing from hidden_imports:')
              for m in missing:
                  print(f'  - {m}')
              exit(1)
          else:
              print(f'All {len(required)} modules in hidden_imports — OK')

          assert 'assets' in content, 'assets not in datas'
          assert 'src' in content, 'src not in datas'
          assert 'run.py' in content, 'run.py not found'
          print('Spec validation — OK')
          "

  docs:
    name: "Docs Validation"
    runs-on: ubuntu-latest
    needs: structure

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check docs files
        run: |
          MISSING=0
          DOCS_FILES=(
            "docs/index.html"
            "docs/style.css"
            "docs/script.js"
            "docs/favicon.svg"
          )

          for f in "${DOCS_FILES[@]}"; do
            if [ ! -f "$f" ]; then
              echo "  MISSING: $f"
              MISSING=$((MISSING + 1))
            else
              echo "  OK: $f"
            fi
          done

          if [ $MISSING -gt 0 ]; then
            echo "WARNING: $MISSING docs file(s) missing"
          else
            echo "All docs files present — OK"
          fi

      - name: Validate HTML
        run: |
          if [ -f "docs/index.html" ]; then
            grep -q "<html" docs/index.html && echo "HTML tag — OK" || echo "WARNING: no html tag"
            grep -q "</html>" docs/index.html && echo "Closing HTML — OK" || echo "WARNING: no closing html"
            grep -q "<head" docs/index.html && echo "HEAD tag — OK" || echo "WARNING: no head"
            grep -q "<body" docs/index.html && echo "BODY tag — OK" || echo "WARNING: no body"
            grep -q "favicon.svg" docs/index.html && echo "Favicon — OK" || echo "WARNING: no favicon"
            grep -q "style.css" docs/index.html && echo "CSS ref — OK" || echo "WARNING: no CSS"
            grep -q "script.js" docs/index.html && echo "JS ref — OK" || echo "WARNING: no JS"
          fi

      - name: Check README badges
        run: |
          if grep -q "komarev.com/ghpvc" README.md; then
            echo "View counter badge — OK"
          else
            echo "WARNING: No view counter badge"
          fi
          if grep -q "img.shields.io" README.md; then
            echo "Shield badges — OK"
          else
            echo "WARNING: No shield badges"
          fi

  summary:
    name: "Test Summary"
    runs-on: ubuntu-latest
    needs: [structure, imports, logic, unit, gui, spec, docs]
    if: always()

    steps:
      - name: Results
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| File Structure | ${{ needs.structure.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Import Check | ${{ needs.imports.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Logic Tests | ${{ needs.logic.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GUI Tests | ${{ needs.gui.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Spec Validation | ${{ needs.spec.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docs Validation | ${{ needs.docs.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any job failed
        if: |
          needs.structure.result == 'failure' ||
          needs.imports.result == 'failure' ||
          needs.logic.result == 'failure' ||
          needs.unit.result == 'failure' ||
          needs.gui.result == 'failure' ||
          needs.spec.result == 'failure'
        run: |
          echo "One or more test jobs failed!"
          exit 1

      - name: All passed
        if: |
          needs.structure.result == 'success' &&
          needs.imports.result == 'success' &&
          needs.logic.result == 'success' &&
          needs.unit.result == 'success' &&
          needs.gui.result == 'success' &&
          needs.spec.result == 'success'
        run: echo "All tests passed!"
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.0.7)"
        required: true
        default: "v1.0.7"

permissions:
  contents: write

env:
  APP_VERSION: ${{ github.event.inputs.version }}
  QT_QPA_PLATFORM: offscreen
  QT_DEPS: >-
    libgl1 libglu1-mesa libegl1 libxkbcommon0
    libdbus-1-3 libxcb-cursor0 libxcb-xinerama0
    libxcb-randr0 libxcb-shape0 libxcb-xfixes0
    libxcb-icccm4 libxcb-image0 libxcb-keysyms1
    libxcb-render-util0 libfontconfig1 libfreetype6

jobs:

  build-windows:
    name: "Windows"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: "pip" }
      - run: pip install --upgrade pip && pip install -r requirements.txt pyinstaller pillow
      - name: Icon
        shell: python
        run: |
          import os; from PIL import Image, ImageDraw
          os.makedirs("assets",exist_ok=True); sizes=[16,32,48,64,128,256]; imgs=[]
          for s in sizes:
              i=Image.new("RGBA",(s,s),(0,0,0,0)); d=ImageDraw.Draw(i); m=s//8
              d.ellipse([m,m,s-m,s-m],fill=(30,30,46,255))
              d.ellipse([s//5,s//5,s-s//5,s-s//5],outline=(137,180,250,255),width=max(2,s//16))
              d.ellipse([s//4,s//4,s-s//4,s-s//4],outline=(203,166,247,200),width=max(1,s//20))
              c=s//2; dd=max(2,s//10); d.ellipse([c-dd,c-dd,c+dd,c+dd],fill=(245,194,231,255))
              imgs.append(i)
          imgs[0].save("assets/icon.ico",format="ICO",sizes=[(s,s) for s in sizes],append_images=imgs[1:])
          imgs[-1].save("assets/icon.png",format="PNG")
      - name: Patch
        shell: python
        run: |
          with open("OmniIDE.spec") as f: c=f.read()
          if "icon=" not in c:
              c=c.replace("entitlements_file=None,","entitlements_file=None,\n    icon='assets/icon.ico',")
              with open("OmniIDE.spec","w") as f: f.write(c)
      - run: pyinstaller OmniIDE.spec
      - run: if (Test-Path "dist/OmniIDE.exe") { Write-Host "OK" } else { exit 1 }
      - uses: actions/upload-artifact@v4
        with: { name: OmniIDE-Windows, path: dist/OmniIDE.exe, retention-days: 5 }

  build-macos:
    name: "macOS"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: "pip" }
      - run: pip install --upgrade pip && pip install -r requirements.txt pyinstaller pillow
      - name: Icon
        shell: python3 {0}
        run: |
          import os; from PIL import Image, ImageDraw
          os.makedirs("assets",exist_ok=True); sizes=[16,32,48,64,128,256]; imgs=[]
          for s in sizes:
              i=Image.new("RGBA",(s,s),(0,0,0,0)); d=ImageDraw.Draw(i); m=s//8
              d.ellipse([m,m,s-m,s-m],fill=(30,30,46,255))
              d.ellipse([s//5,s//5,s-s//5,s-s//5],outline=(137,180,250,255),width=max(2,s//16))
              d.ellipse([s//4,s//4,s-s//4,s-s//4],outline=(203,166,247,200),width=max(1,s//20))
              c=s//2; dd=max(2,s//10); d.ellipse([c-dd,c-dd,c+dd,c+dd],fill=(245,194,231,255))
              imgs.append(i)
          imgs[0].save("assets/icon.ico",format="ICO",sizes=[(s,s) for s in sizes],append_images=imgs[1:])
          imgs[-1].save("assets/icon.png",format="PNG")
      - run: pyinstaller OmniIDE.spec
      - run: cd dist && ([ -d OmniIDE.app ] && zip -r OmniIDE-macOS.zip OmniIDE.app || (chmod +x OmniIDE && zip -r OmniIDE-macOS.zip OmniIDE))
      - uses: actions/upload-artifact@v4
        with: { name: OmniIDE-macOS, path: dist/OmniIDE-macOS.zip, retention-days: 5 }

  build-linux:
    name: "Linux"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: "pip" }
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y ${{ env.QT_DEPS }} binutils
          pip install --upgrade pip && pip install -r requirements.txt pyinstaller pillow
      - name: Icon
        shell: python3 {0}
        run: |
          import os; from PIL import Image, ImageDraw
          os.makedirs("assets",exist_ok=True); sizes=[16,32,48,64,128,256]; imgs=[]
          for s in sizes:
              i=Image.new("RGBA",(s,s),(0,0,0,0)); d=ImageDraw.Draw(i); m=s//8
              d.ellipse([m,m,s-m,s-m],fill=(30,30,46,255))
              d.ellipse([s//5,s//5,s-s//5,s-s//5],outline=(137,180,250,255),width=max(2,s//16))
              d.ellipse([s//4,s//4,s-s//4,s-s//4],outline=(203,166,247,200),width=max(1,s//20))
              c=s//2; dd=max(2,s//10); d.ellipse([c-dd,c-dd,c+dd,c+dd],fill=(245,194,231,255))
              imgs.append(i)
          imgs[0].save("assets/icon.ico",format="ICO",sizes=[(s,s) for s in sizes],append_images=imgs[1:])
          imgs[-1].save("assets/icon.png",format="PNG")
      - run: pyinstaller OmniIDE.spec
      - run: chmod +x dist/OmniIDE && cd dist && tar -czvf OmniIDE-Linux.tar.gz OmniIDE
      - uses: actions/upload-artifact@v4
        with: { name: OmniIDE-Linux, path: dist/OmniIDE-Linux.tar.gz, retention-days: 5 }

  release:
    name: "Publish"
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: OmniIDE-Windows, path: release/win/ }
      - uses: actions/download-artifact@v4
        with: { name: OmniIDE-macOS, path: release/mac/ }
      - uses: actions/download-artifact@v4
        with: { name: OmniIDE-Linux, path: release/linux/ }
      - name: Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -f ${{ env.APP_VERSION }}
          git push origin ${{ env.APP_VERSION }} --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Changelog
        run: |
          cat << 'EOF' > changelog.md
          ## OmniIDE ${{ env.APP_VERSION }}

          | Platform | File |
          |----------|------|
          | Windows | `OmniIDE.exe` |
          | macOS | `OmniIDE-macOS.zip` |
          | Linux | `OmniIDE-Linux.tar.gz` |

          **Windows** — Download and run.
          **macOS** — `unzip OmniIDE-macOS.zip && open OmniIDE.app`
          **Linux** — `tar -xzvf OmniIDE-Linux.tar.gz && chmod +x OmniIDE && ./OmniIDE`

          Built with PyQt6 by **OmniNodeCo**
          EOF
      - uses: softprops/action-gh-release@v2
        with:
          name: "OmniIDE ${{ env.APP_VERSION }}"
          tag_name: ${{ env.APP_VERSION }}
          body_path: changelog.md
          draft: false
          prerelease: false
          make_latest: true
          files: |
            release/win/OmniIDE.exe
            release/mac/OmniIDE-macOS.zip
            release/linux/OmniIDE-Linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
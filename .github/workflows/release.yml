name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.0.3)"
        required: true
        default: "v1.0.3"

permissions:
  contents: write

env:
  APP_VERSION: ${{ github.ref_name || github.event.inputs.version }}

jobs:

  # ─────────────────────────────────────────
  # WINDOWS
  # ─────────────────────────────────────────
  build-windows:
    name: "Windows"
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Generate icon
        shell: python
        run: |
          import os
          from PIL import Image, ImageDraw

          os.makedirs("assets", exist_ok=True)
          sizes = [16, 32, 48, 64, 128, 256]
          images = []
          for size in sizes:
              img = Image.new("RGBA", (size, size), (0, 0, 0, 0))
              draw = ImageDraw.Draw(img)
              m = size // 8
              draw.ellipse([m, m, size-m, size-m], fill=(30, 30, 46, 255))
              r_w = max(2, size // 16)
              r_m = size // 5
              draw.ellipse([r_m, r_m, size-r_m, size-r_m], outline=(137, 180, 250, 255), width=r_w)
              i = size // 4
              draw.ellipse([i, i, size-i, size-i], outline=(203, 166, 247, 200), width=max(1, size//20))
              c = size // 2
              d = max(2, size // 10)
              draw.ellipse([c-d, c-d, c+d, c+d], fill=(245, 194, 231, 255))
              images.append(img)
          images[0].save(
              "assets/icon.ico", format="ICO",
              sizes=[(s, s) for s in sizes],
              append_images=images[1:],
          )
          images[-1].save("assets/icon.png", format="PNG")
          print("Icons generated")

      - name: Patch spec with icon
        shell: python
        run: |
          with open("OmniIDE.spec", "r") as f:
              c = f.read()
          if "icon=" not in c:
              c = c.replace(
                  "entitlements_file=None,",
                  "entitlements_file=None,\n    icon='assets/icon.ico',",
              )
              with open("OmniIDE.spec", "w") as f:
                  f.write(c)
          print("Spec patched")

      - name: Build
        run: pyinstaller OmniIDE.spec

      - name: Verify
        run: |
          if (Test-Path "dist/OmniIDE.exe") {
            $size = (Get-Item "dist/OmniIDE.exe").Length / 1MB
            Write-Host "Built OmniIDE.exe ($([math]::Round($size,1)) MB)"
          } else {
            Write-Host "Build failed"
            exit 1
          }

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: OmniIDE-Windows
          path: dist/OmniIDE.exe
          retention-days: 5

  # ─────────────────────────────────────────
  # MACOS
  # ─────────────────────────────────────────
  build-macos:
    name: "macOS"
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          brew install python-tk@3.11 || true
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Generate icon
        shell: python3 {0}
        run: |
          import os
          from PIL import Image, ImageDraw

          os.makedirs("assets", exist_ok=True)
          sizes = [16, 32, 48, 64, 128, 256, 512]
          images = []
          for size in sizes:
              img = Image.new("RGBA", (size, size), (0, 0, 0, 0))
              draw = ImageDraw.Draw(img)
              m = size // 8
              draw.ellipse([m, m, size-m, size-m], fill=(30, 30, 46, 255))
              r_w = max(2, size // 16)
              r_m = size // 5
              draw.ellipse([r_m, r_m, size-r_m, size-r_m], outline=(137, 180, 250, 255), width=r_w)
              i = size // 4
              draw.ellipse([i, i, size-i, size-i], outline=(203, 166, 247, 200), width=max(1, size//20))
              c = size // 2
              d = max(2, size // 10)
              draw.ellipse([c-d, c-d, c+d, c+d], fill=(245, 194, 231, 255))
              images.append(img)
          ico_imgs = [img for img in images if img.size[0] <= 256]
          ico_imgs[0].save(
              "assets/icon.ico", format="ICO",
              sizes=[(img.size[0], img.size[0]) for img in ico_imgs],
              append_images=ico_imgs[1:],
          )
          images[-1].save("assets/icon.png", format="PNG")
          print("Icons generated")

      - name: Build
        run: pyinstaller OmniIDE.spec

      - name: Package
        run: |
          cd dist
          if [ -d "OmniIDE.app" ]; then
            zip -r OmniIDE-macOS.zip OmniIDE.app
          else
            chmod +x OmniIDE
            zip -r OmniIDE-macOS.zip OmniIDE
          fi
          ls -lh OmniIDE-macOS.zip

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: OmniIDE-macOS
          path: dist/OmniIDE-macOS.zip
          retention-days: 5

  # ─────────────────────────────────────────
  # LINUX
  # ─────────────────────────────────────────
  build-linux:
    name: "Linux"
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            python3-tk python3-dev tk-dev \
            libx11-dev libxft-dev libxext-dev \
            libffi-dev binutils

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Generate icon
        shell: python3 {0}
        run: |
          import os
          from PIL import Image, ImageDraw

          os.makedirs("assets", exist_ok=True)
          sizes = [16, 32, 48, 64, 128, 256]
          images = []
          for size in sizes:
              img = Image.new("RGBA", (size, size), (0, 0, 0, 0))
              draw = ImageDraw.Draw(img)
              m = size // 8
              draw.ellipse([m, m, size-m, size-m], fill=(30, 30, 46, 255))
              r_w = max(2, size // 16)
              r_m = size // 5
              draw.ellipse([r_m, r_m, size-r_m, size-r_m], outline=(137, 180, 250, 255), width=r_w)
              i = size // 4
              draw.ellipse([i, i, size-i, size-i], outline=(203, 166, 247, 200), width=max(1, size//20))
              c = size // 2
              d = max(2, size // 10)
              draw.ellipse([c-d, c-d, c+d, c+d], fill=(245, 194, 231, 255))
              images.append(img)
          images[0].save(
              "assets/icon.ico", format="ICO",
              sizes=[(s, s) for s in sizes],
              append_images=images[1:],
          )
          images[-1].save("assets/icon.png", format="PNG")
          print("Icons generated")

      - name: Build
        run: pyinstaller OmniIDE.spec

      - name: Package
        run: |
          chmod +x dist/OmniIDE
          cd dist
          tar -czvf OmniIDE-Linux.tar.gz OmniIDE
          ls -lh OmniIDE-Linux.tar.gz

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: OmniIDE-Linux
          path: dist/OmniIDE-Linux.tar.gz
          retention-days: 5

  # ─────────────────────────────────────────
  # PUBLISH RELEASE
  # ─────────────────────────────────────────
  release:
    name: "Publish Release"
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: OmniIDE-Windows
          path: release/windows/

      - name: Download macOS
        uses: actions/download-artifact@v4
        with:
          name: OmniIDE-macOS
          path: release/macos/

      - name: Download Linux
        uses: actions/download-artifact@v4
        with:
          name: OmniIDE-Linux
          path: release/linux/

      - name: List files
        run: find release/ -type f -exec ls -lh {} \;

      - name: Read version from config
        id: version
        run: |
          VER=$(python3 -c "
          import re
          with open('src/config.py') as f:
              content = f.read()
          match = re.search(r'APP_VERSION\s*=\s*[\"''](.+?)[\"'']', content)
          print(match.group(1) if match else 'unknown')
          ")
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Detected version: $VER"

      - name: Generate changelog
        run: |
          cat << 'CHANGES' > changelog.md
          ## What's New in ${{ env.APP_VERSION }}

          ### Features
          - **Settings GUI** (`Ctrl+,`) — full visual settings editor
            - Appearance: theme, font, font size, cursor blink, whitespace
            - Editor: tab size, word wrap, auto indent, auto save, line numbers
            - Terminal: default shell selection
            - Updates: auto-check toggle + manual check button
            - Searchable, live-apply, reset to defaults
          - **Auto-update checker** — queries GitHub Releases on startup
            - Shows current vs latest version comparison
            - Full release notes with scrollable view
            - Platform-specific download button with file size
            - Configurable: can disable in Settings
          - **Command Palette** (`Ctrl+Shift+P`) — 50+ fuzzy-searchable commands
          - **Go to Line** (`Ctrl+G`), **Toggle Comment** (`Ctrl+/`)
          - **Line operations**: duplicate, delete, move up/down
          - **VS Code Extension Marketplace** — search, install, uninstall
          - **Git Integration** — clone, init, commit, push, pull, diff, log, branches
          - **Real Interactive Terminal** — Bash, PowerShell, CMD, Zsh, Fish
          - **Shell Selector** — dropdown per OS
          - **SVG Icon System** — custom rendered, no emoji
          - **Animated Splash Screen** — with progress bar
          - **Round Modern Buttons** — proper hover/leave behavior

          ### Bug Fixes
          - Fixed button hover staying highlighted after mouse leave
          - Fixed deferred menu bindings for command palette
          - Fixed PanedWindow crash (tkinter.ttk)
          - Fixed search bar crash during startup
          - Fixed icon missing in CI builds

          ### Downloads

          | Platform | File |
          |----------|------|
          | Windows | `OmniIDE.exe` |
          | macOS | `OmniIDE-macOS.zip` |
          | Linux | `OmniIDE-Linux.tar.gz` |

          ### Install

          **Windows** — Download `OmniIDE.exe` and run. No install needed.

          **macOS**
          ```bash
          unzip OmniIDE-macOS.zip
          open OmniIDE.app
          ```

          **Linux**
          ```bash
          tar -xzvf OmniIDE-Linux.tar.gz
          chmod +x OmniIDE
          ./OmniIDE
          ```

          ---
          Made with care by **OmniNodeCo**
          CHANGES

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "OmniIDE ${{ env.APP_VERSION }}"
          tag_name: ${{ env.APP_VERSION }}
          body_path: changelog.md
          draft: false
          prerelease: false
          make_latest: true
          files: |
            release/windows/OmniIDE.exe
            release/macos/OmniIDE-macOS.zip
            release/linux/OmniIDE-Linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Release Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ env.APP_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|------|" >> $GITHUB_STEP_SUMMARY

          WIN_SIZE=$(du -h release/windows/OmniIDE.exe 2>/dev/null | cut -f1 || echo "N/A")
          MAC_SIZE=$(du -h release/macos/OmniIDE-macOS.zip 2>/dev/null | cut -f1 || echo "N/A")
          LIN_SIZE=$(du -h release/linux/OmniIDE-Linux.tar.gz 2>/dev/null | cut -f1 || echo "N/A")

          echo "| Windows | OmniIDE.exe | $WIN_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS | OmniIDE-macOS.zip | $MAC_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux | OmniIDE-Linux.tar.gz | $LIN_SIZE |" >> $GITHUB_STEP_SUMMARY
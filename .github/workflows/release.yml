name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.0.4)"
        required: true
        default: "v1.0.4"

permissions:
  contents: write

env:
  APP_VERSION: ${{ github.event.inputs.version }}

jobs:

  build-windows:
    name: "Windows"
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Generate icon
        shell: python
        run: |
          import os
          from PIL import Image, ImageDraw
          os.makedirs("assets", exist_ok=True)
          sizes = [16, 32, 48, 64, 128, 256]
          images = []
          for size in sizes:
              img = Image.new("RGBA", (size, size), (0, 0, 0, 0))
              draw = ImageDraw.Draw(img)
              m = size // 8
              draw.ellipse([m, m, size-m, size-m], fill=(30, 30, 46, 255))
              r_w = max(2, size // 16)
              r_m = size // 5
              draw.ellipse([r_m, r_m, size-r_m, size-r_m], outline=(137, 180, 250, 255), width=r_w)
              i = size // 4
              draw.ellipse([i, i, size-i, size-i], outline=(203, 166, 247, 200), width=max(1, size//20))
              c = size // 2
              d = max(2, size // 10)
              draw.ellipse([c-d, c-d, c+d, c+d], fill=(245, 194, 231, 255))
              images.append(img)
          images[0].save("assets/icon.ico", format="ICO", sizes=[(s,s) for s in sizes], append_images=images[1:])
          images[-1].save("assets/icon.png", format="PNG")

      - name: Patch spec with icon
        shell: python
        run: |
          with open("OmniIDE.spec", "r") as f:
              c = f.read()
          if "icon=" not in c:
              c = c.replace("entitlements_file=None,", "entitlements_file=None,\n    icon='assets/icon.ico',")
              with open("OmniIDE.spec", "w") as f:
                  f.write(c)

      - name: Build
        run: pyinstaller OmniIDE.spec

      - name: Verify
        run: |
          if (Test-Path "dist/OmniIDE.exe") {
            $size = (Get-Item "dist/OmniIDE.exe").Length / 1MB
            Write-Host "Built OmniIDE.exe ($([math]::Round($size,1)) MB)"
          } else { exit 1 }

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: OmniIDE-Windows
          path: dist/OmniIDE.exe
          retention-days: 5

  build-macos:
    name: "macOS"
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          brew install python-tk@3.11 || true
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Generate icon
        shell: python3 {0}
        run: |
          import os
          from PIL import Image, ImageDraw
          os.makedirs("assets", exist_ok=True)
          sizes = [16, 32, 48, 64, 128, 256, 512]
          images = []
          for size in sizes:
              img = Image.new("RGBA", (size, size), (0, 0, 0, 0))
              draw = ImageDraw.Draw(img)
              m = size // 8
              draw.ellipse([m, m, size-m, size-m], fill=(30, 30, 46, 255))
              r_w = max(2, size // 16)
              r_m = size // 5
              draw.ellipse([r_m, r_m, size-r_m, size-r_m], outline=(137, 180, 250, 255), width=r_w)
              i = size // 4
              draw.ellipse([i, i, size-i, size-i], outline=(203, 166, 247, 200), width=max(1, size//20))
              c = size // 2
              d = max(2, size // 10)
              draw.ellipse([c-d, c-d, c+d, c+d], fill=(245, 194, 231, 255))
              images.append(img)
          ico_imgs = [img for img in images if img.size[0] <= 256]
          ico_imgs[0].save("assets/icon.ico", format="ICO",
              sizes=[(img.size[0], img.size[0]) for img in ico_imgs], append_images=ico_imgs[1:])
          images[-1].save("assets/icon.png", format="PNG")

      - name: Build
        run: pyinstaller OmniIDE.spec

      - name: Package
        run: |
          cd dist
          if [ -d "OmniIDE.app" ]; then zip -r OmniIDE-macOS.zip OmniIDE.app
          else chmod +x OmniIDE && zip -r OmniIDE-macOS.zip OmniIDE; fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: OmniIDE-macOS
          path: dist/OmniIDE-macOS.zip
          retention-days: 5

  build-linux:
    name: "Linux"
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            python3-tk python3-dev tk-dev \
            libx11-dev libxft-dev libxext-dev \
            libffi-dev binutils

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Generate icon
        shell: python3 {0}
        run: |
          import os
          from PIL import Image, ImageDraw
          os.makedirs("assets", exist_ok=True)
          sizes = [16, 32, 48, 64, 128, 256]
          images = []
          for size in sizes:
              img = Image.new("RGBA", (size, size), (0, 0, 0, 0))
              draw = ImageDraw.Draw(img)
              m = size // 8
              draw.ellipse([m, m, size-m, size-m], fill=(30, 30, 46, 255))
              r_w = max(2, size // 16)
              r_m = size // 5
              draw.ellipse([r_m, r_m, size-r_m, size-r_m], outline=(137, 180, 250, 255), width=r_w)
              i = size // 4
              draw.ellipse([i, i, size-i, size-i], outline=(203, 166, 247, 200), width=max(1, size//20))
              c = size // 2
              d = max(2, size // 10)
              draw.ellipse([c-d, c-d, c+d, c+d], fill=(245, 194, 231, 255))
              images.append(img)
          images[0].save("assets/icon.ico", format="ICO", sizes=[(s,s) for s in sizes], append_images=images[1:])
          images[-1].save("assets/icon.png", format="PNG")

      - name: Build
        run: pyinstaller OmniIDE.spec

      - name: Package
        run: |
          chmod +x dist/OmniIDE
          cd dist && tar -czvf OmniIDE-Linux.tar.gz OmniIDE

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: OmniIDE-Linux
          path: dist/OmniIDE-Linux.tar.gz
          retention-days: 5

  release:
    name: "Publish Release"
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: OmniIDE-Windows
          path: release/windows/

      - name: Download macOS
        uses: actions/download-artifact@v4
        with:
          name: OmniIDE-macOS
          path: release/macos/

      - name: Download Linux
        uses: actions/download-artifact@v4
        with:
          name: OmniIDE-Linux
          path: release/linux/

      - name: List files
        run: find release/ -type f -exec ls -lh {} \;

      - name: Create tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -f ${{ env.APP_VERSION }}
          git push origin ${{ env.APP_VERSION }} --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog
        run: |
          cat << 'CHANGES' > changelog.md
          ## OmniIDE ${{ env.APP_VERSION }}

          ### Downloads
          | Platform | File |
          |----------|------|
          | Windows | `OmniIDE.exe` |
          | macOS | `OmniIDE-macOS.zip` |
          | Linux | `OmniIDE-Linux.tar.gz` |

          ### Install
          **Windows** — Download and double-click. No install needed.

          **macOS**
          ```bash
          unzip OmniIDE-macOS.zip && open OmniIDE.app
          ```

          **Linux**
          ```bash
          tar -xzvf OmniIDE-Linux.tar.gz && chmod +x OmniIDE && ./OmniIDE
          ```

          ---
          Made with care by **OmniNodeCo**
          CHANGES

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "OmniIDE ${{ env.APP_VERSION }}"
          tag_name: ${{ env.APP_VERSION }}
          body_path: changelog.md
          draft: false
          prerelease: false
          make_latest: true
          files: |
            release/windows/OmniIDE.exe
            release/macos/OmniIDE-macOS.zip
            release/linux/OmniIDE-Linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Release Published" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ env.APP_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|" >> $GITHUB_STEP_SUMMARY
          WIN=$(du -h release/windows/OmniIDE.exe 2>/dev/null | cut -f1 || echo "N/A")
          MAC=$(du -h release/macos/OmniIDE-macOS.zip 2>/dev/null | cut -f1 || echo "N/A")
          LIN=$(du -h release/linux/OmniIDE-Linux.tar.gz 2>/dev/null | cut -f1 || echo "N/A")
          echo "| Windows | $WIN |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS | $MAC |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux | $LIN |" >> $GITHUB_STEP_SUMMARY
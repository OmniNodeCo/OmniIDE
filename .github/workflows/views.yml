name: Views

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1"

permissions:
  contents: read

jobs:
  check:
    name: "Verify Badges"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check badges
        run: |
          PASS=0; WARN=0
          check() { if grep -q "$1" README.md; then echo "  OK: $2"; PASS=$((PASS+1)); else echo "  WARN: $2"; WARN=$((WARN+1)); fi; }
          check "komarev.com/ghpvc" "Profile view counter"
          check "img.shields.io/github/stars" "Stars badge"
          check "img.shields.io/github/forks" "Forks badge"
          check "img.shields.io/github/issues" "Issues badge"
          check "img.shields.io/github/v/release" "Release badge"
          check "img.shields.io/github/actions/workflow/status" "Build badge"
          check "1.0.7" "Version 1.0.7"
          check "PyQt6" "PyQt6 mention"
          echo ""; echo "$PASS passed, $WARN warnings"
      - name: Docs check
        run: |
          [ -f docs/index.html ] && grep -q "1.0.7" docs/index.html && echo "Docs v1.0.7 OK" || echo "WARN: docs version"
      - name: Summary
        run: |
          echo "## Badge Check v1.0.7" >> $GITHUB_STEP_SUMMARY
          echo "Badges auto-update via komarev.com and shields.io" >> $GITHUB_STEP_SUMMARY
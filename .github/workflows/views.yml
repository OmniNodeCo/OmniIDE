name: Views

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: "Verify Badge"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          if grep -q "komarev.com/ghpvc" README.md; then
            echo "View counter badge — OK"
          else
            echo "WARNING: No komarev badge in README"
          fi
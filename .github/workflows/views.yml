name: Track Views

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-counter:
    name: Update View Badge
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify badge exists in README
        run: |
          if grep -q "komarev.com/ghpvc" README.md; then
            echo "View counter badge found in README.md"
          else
            echo "Warning: No komarev badge found in README.md"
            echo "Add this to your README.md:"
            echo '![Views](https://komarev.com/ghpvc/?username=OmniNodeCo-OmniIDE&label=Views&color=89b4fa&style=for-the-badge&abbreviated=true)'
          fi

      - name: Done
        run: echo "View counter is handled by komarev.com badge in README — no action needed"
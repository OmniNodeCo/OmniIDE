# Reusable GitHub Action
# @author OmniNodeCo
name: 'Views Badge'
description: 'Count repo views and generate a badge JSON. Config read from .viewsbadge in your repo.'
author: 'OmniNodeCo'

branding:
  icon: 'eye'
  color: 'blue'

inputs:
  token:
    description: 'GitHub token'
    required: true
  visitor:
    description: 'GitHub username of the visitor (optional)'
    required: false
    default: ''
  output_file:
    description: 'Path to write the badge JSON'
    required: false
    default: '.views/badge.json'
  config_file:
    description: 'Path to config file in this repo'
    required: false
    default: '.viewsbadge'

outputs:
  count:
    description: 'Current view count'

runs:
  using: 'node20'
  main: 'action/src/generate.js'
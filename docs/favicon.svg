<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#89b4fa"/>
      <stop offset="100%" stop-color="#1e1e2e"/>
    </radialGradient>
    <radialGradient id="ring" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#cba6f7"/>
      <stop offset="100%" stop-color="#89b4fa"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>

  <!-- Accent ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="url(#ring)" stroke-width="2.5" opacity="0.85"/>

  <!-- Inner dark circle -->
  <circle cx="32" cy="32" r="14" fill="#181825"/>

  <!-- Left bracket < -->
  <text x="24" y="37" font-family="Consolas,monospace" font-size="14" font-weight="bold" fill="#cba6f7" text-anchor="middle" filter="url(#glow)">&lt;</text>

  <!-- Right bracket > -->
  <text x="40" y="37" font-family="Consolas,monospace" font-size="14" font-weight="bold" fill="#89b4fa" text-anchor="middle" filter="url(#glow)">&gt;</text>

  <!-- Center dot -->
  <circle cx="32" cy="32" r="2" fill="#f5c2e7" filter="url(#glow)"/>

  <!-- Top highlight shimmer -->
  <ellipse cx="26" cy="22" rx="8" ry="3" fill="white" opacity="0.06" transform="rotate(-20 26 22)"/>
</svg>